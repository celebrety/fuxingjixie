<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成都市青白江区复兴机械厂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 加载页 */
        #loading {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(200, 134, 10, 0.4); }
            50% { transform: scale(1.06); box-shadow: 0 0 0 14px rgba(200, 134, 10, 0); }
        }

        .loading-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .loading-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 40px;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #c8860a, #f4c055);
            border-radius: 2px;
            animation: loadbar 1.2s ease-in-out forwards;
        }

        @keyframes loadbar {
            0% { width: 0%; }
            60% { width: 80%; }
            100% { width: 100%; }
        }

        /* iframe 全屏 */
        #pageFrame {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            position: fixed;
            inset: 0;
        }

        #pageFrame.visible {
            display: block;
        }
    </style>
</head>
<body>

    <!-- 加载动画 -->
    <div id="loading">
        <div class="loading-logo">⚙️</div>
        <div class="loading-name">复兴机械厂</div>
        <div class="loading-sub">成都市青白江区</div>
        <div class="loading-bar">
            <div class="loading-bar-inner"></div>
        </div>
    </div>

    <!-- 页面容器（iframe） -->
    <iframe id="pageFrame" scrolling="yes" allowfullscreen></iframe>

    <script>
        /**
         * 设备检测：通过 UA + 屏幕宽度双重判断
         * 移动设备 UA 关键词或屏幕宽度 ≤ 768px → H5版
         * 否则 → Web版
         */
        function isMobileDevice() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const mobileReg = /Android|iPhone|iPad|iPod|BlackBerry|Windows Phone|Mobile|Symbian|Opera Mini/i;
            return mobileReg.test(ua) || window.innerWidth <= 768;
        }

        // 根据设备决定加载哪个文件
        const targetFile = isMobileDevice() ? 'index_h5.html' : 'index_web.html';

        const loading = document.getElementById('loading');
        const frame = document.getElementById('pageFrame');

        // 设置 iframe src，触发加载
        frame.src = targetFile;

        // iframe 加载完成后隐藏 loading，显示页面
        frame.addEventListener('load', function () {
            // 同步 iframe 内页面的标题到外层
            try {
                document.title = frame.contentDocument.title || document.title;
            } catch (e) { /* 跨域时忽略 */ }

            // 平滑淡出 loading
            loading.style.opacity = '0';
            setTimeout(function () {
                loading.style.display = 'none';
                frame.classList.add('visible');
            }, 500);
        });

        // iframe 加载失败处理
        frame.addEventListener('error', function () {
            loading.innerHTML = `
                <div style="text-align:center; color:#fff; font-family:'Microsoft YaHei',sans-serif;">
                    <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
                    <div style="font-size:18px; margin-bottom:8px;">页面加载失败</div>
                    <div style="font-size:14px; opacity:0.7; margin-bottom:24px;">请确认文件是否存在并刷新重试</div>
                    <button onclick="location.reload()" style="
                        background:#c8860a; color:#fff; border:none; padding:10px 28px;
                        border-radius:20px; font-size:14px; cursor:pointer;">
                        刷新重试
                    </button>
                </div>`;
        });

        // 窗口大小变化：若跨越 768px 断点则刷新，保证切换正确版本
        let prevIsMobile = isMobileDevice();
        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                const nowIsMobile = isMobileDevice();
                if (nowIsMobile !== prevIsMobile) {
                    prevIsMobile = nowIsMobile;
                    location.reload();
                }
            }, 400);
        });
    </script>

</body>
</html>
